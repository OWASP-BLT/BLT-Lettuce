name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  critical-components:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio

    - name: Verify manifest and routing contracts
      run: |
        grep -Fq "/lettuce-org-add" manifest.yaml
        grep -Fq "/lettuce-set-invite" manifest.yaml
        grep -Fq "/lettuce-settings" manifest.yaml
        grep -Fq "/lettuce-app-link" manifest.yaml
        grep -Fq "member_joined_channel" manifest.yaml
        grep -Fq "_handle_settings_command" src/worker.py
        grep -Fq "run_workspace_metrics_sync" src/worker.py
        grep -Fq "send_missing_github_org_alert" src/worker.py

    - name: Run critical-path tests
      env:
        PYTHONPATH: src
      run: |
        pytest -q \
          tests/test_worker_utils.py::test_handle_app_link_command_uses_workspace_app_id \
          tests/test_worker_utils.py::test_handle_app_link_command_falls_back_to_env_app_id \
          tests/test_worker_utils.py::test_handle_app_link_command_reports_missing_app_id \
          tests/test_worker_utils.py::test_handle_set_invite_command_saves_link_for_admin \
          tests/test_worker_utils.py::test_handle_set_invite_command_rejects_invalid_url \
          tests/test_worker_utils.py::test_handle_settings_command_shows_commands_and_current_settings \
          tests/test_worker_utils.py::test_run_workspace_metrics_sync_uses_full_workspace_for_alert_target

  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run tests
      env:
        PYTHONPATH: src
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: success()
      with:
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install pre-commit
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit
    
    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files
