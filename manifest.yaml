display_information:
  name: Lettuce
  description: Slack bot that welcomes new members and helps them discover security projects
  background_color: "#FF0000"
  long_description: An intelligent OWASP Slack bot that welcomes new community members, helps them discover security projects through interactive conversations, and connects the global cybersecurity community. Powered by Cloudflare Workers for global, low-latency performance.

features:
  bot_user:
    display_name: Lettuce
    always_online: true
  slash_commands:
    - command: /lettuce-welcome
      url: https://lettuce.owaspblt.org/webhook
      description: Send the welcome message to yourself
      should_escape: false
    - command: /lettuce-org-add
      url: https://lettuce.owaspblt.org/webhook
      description: Add the GitHub org that the bot will be connected to
      should_escape: false
    - command: /lettuce-disconnect
      url: https://lettuce.owaspblt.org/webhook
      description: Remove all bot data for this workspace from the database
      should_escape: false
    - command: /lettuce-app-link
      url: https://lettuce.owaspblt.org/webhook
      description: Open the Slack app link
      should_escape: false
    - command: /lettuce-set-invite
      url: https://lettuce.owaspblt.org/webhook
      description: Set the workspace Slack invite link for the homepage card
      should_escape: false
    - command: /lettuce-settings
      url: https://lettuce.owaspblt.org/webhook
      description: Show current workspace settings configured by bot commands
      should_escape: false
oauth_config:
  redirect_urls:
    - https://lettuce.owaspblt.org/callback
  scopes:
    bot:
      - scope: app_mentions:read
        description: Detect when bot is mentioned in conversations for context-aware responses
      - scope: channels:history
        description: Read channel message history to understand context and provide relevant assistance
      - scope: channels:read
        description: List and retrieve channel information for workspace navigation
      - scope: channels:write
        description: Manage channel topics and purposes during configuration
      - scope: chat:write
        description: Send welcome messages, join messages, and responses to channels and direct messages
      - scope: chat:write.customize
        description: Add custom branding and bot logo to messages for better visual identity
      - scope: chat:write.public
        description: Send messages to channels the bot is not currently a member of
      - scope: commands
        description: Register and process slash commands like /lettuce-welcome and /lettuce-settings
      - scope: groups:history
        description: Read private channel message history for context in closed conversations
      - scope: groups:read
        description: List and access private channel information
      - scope: groups:write
        description: Manage private channel metadata during configuration
      - scope: im:history
        description: Read direct message history for user context and interaction tracking
      - scope: im:read
        description: Access and read direct message conversations with users
      - scope: im:write
        description: Send direct messages for welcome sequences and member notifications
      - scope: mpim:history
        description: Read multi-person direct message history for group context
      - scope: mpim:read
        description: Access multi-person direct message conversations
      - scope: mpim:write
        description: Send messages to multi-person direct conversations
      - scope: users:read
        description: Look up user names and profile information for personalized messages
      - scope: team:read
        description: Access workspace team information for workspace management and configuration
settings:
  event_subscriptions:
    request_url: https://lettuce.owaspblt.org/webhook
    bot_events:
      - team_join
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - app_mention
  interactivity:
    is_enabled: true
    request_url: https://lettuce.owaspblt.org/webhook
  org_deploy_enabled: true
  socket_mode_enabled: false
  token_rotation_enabled: false
