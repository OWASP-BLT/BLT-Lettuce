display_information:
  name: Lettuce
  description: Slack bot that welcomes new members and helps them discover security projects
  background_color: "#4DBD15"
  long_description: An intelligent  Slack bot that welcomes new community members, helps them discover security projects through interactive conversations, and connects the global open source community. Powered by Cloudflare Workers for global, low-latency performance.
features:
  bot_user:
    display_name: Lettuce
    always_online: true
  slash_commands:
    - command: /lettuce-welcome
      url: https://lettuce.owaspblt.org/webhook
      description: Send the welcome message to yourself
      should_escape: false
    - command: /lettuce-org-add
      url: https://lettuce.owaspblt.org/webhook
      description: Add the GitHub org that the bot will be connected to
      should_escape: false
    - command: /lettuce-disconnect
      url: https://lettuce.owaspblt.org/webhook
      description: Remove all bot data for this workspace from the database
      should_escape: false
    - command: /lettuce-app-link
      url: https://lettuce.owaspblt.org/webhook
      description: Open the Slack app link
      should_escape: false
    - command: /lettuce-set-invite
      url: https://lettuce.owaspblt.org/webhook
      description: Set the workspace Slack invite link for the homepage card
      should_escape: false
    - command: /lettuce-settings
      url: https://lettuce.owaspblt.org/webhook
      description: Show current workspace settings configured by bot commands
      should_escape: false
oauth_config:
  redirect_urls:
    - https://lettuce.owaspblt.org/callback
  scopes:
    bot:
      # Detect when bot is mentioned in conversations for context-aware responses and engagement
      - app_mentions:read
      # Read message history in public channels to understand context and provide relevant assistance
      - channels:history
      # Look up channel information to route messages correctly and identify which channels to monitor
      - channels:read
      # Send welcome messages, join notifications, and responses to channels and direct messages
      - chat:write
      # Add custom branding and bot logo to messages to maintain consistent visual identity throughout
      - chat:write.customize
      # Send messages to public channels the bot isn't explicitly a member of for broader community reach
      - chat:write.public
      # Handle slash commands like /lettuce-welcome and /lettuce-settings for workspace user interaction
      - commands
      # Read message history in private channels to understand context and respond appropriately there
      - groups:history
      # Look up private channel information to provide support and route messages to correct places
      - groups:read
      # Create and manage private channels during workspace configuration and community onboarding setup
      - groups:write
      # Read message history in direct messages for context-aware personalized assistance and responses
      - im:history
      # Access direct message conversations to send welcome sequences and member notifications reliably
      - im:read
      # Send direct messages for welcome sequences, member notifications, and fallback delivery mechanisms
      - im:write
      # Read message history in group direct messages to understand complex multi-user conversation context
      - mpim:history
      # Access group direct message conversations to send coordinated messages and announcements to users
      - mpim:read
      # Send messages to group direct conversations for team announcements and broader community engagement
      - mpim:write
      # Access workspace information to identify metadata, verify configuration, and personalize responses
      - team:read
      # Look up user names and profile information to personalize welcome messages and send notifications
      - users:read
  pkce_enabled: false
settings:
  event_subscriptions:
    request_url: https://lettuce.owaspblt.org/webhook
    bot_events:
      - team_join
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - app_mention
      - app_home_opened
  interactivity:
    is_enabled: true
    request_url: https://lettuce.owaspblt.org/webhook
  org_deploy_enabled: true
  socket_mode_enabled: false
  token_rotation_enabled: false
