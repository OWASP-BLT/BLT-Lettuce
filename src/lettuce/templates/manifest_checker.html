<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manifest Checker - BLT-Lettuce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://js.sentry-cdn.com/73ec24fc4cd44cec10017d622968ee3a.min.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="h-14 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img class="w-8 h-8" src="https://raw.githubusercontent.com/OWASP-BLT/BLT-Lettuce/main/docs/static/logo.png" alt="OWASP Logo" />
          <span class="font-bold text-gray-900">BLT-Lettuce</span>
          <span class="text-gray-300">|</span>
          <span class="text-sm text-gray-500">Manifest Checker</span>
        </div>
        <div class="flex items-center gap-4 text-sm">
          <a href="/" class="text-gray-500 hover:text-gray-900"><i class="fas fa-home mr-1"></i>Home</a>
          <a href="/status" class="text-gray-500 hover:text-gray-900"><i class="fas fa-heartbeat mr-1"></i>Status</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Manifest Checker</h1>
      <p class="text-sm text-gray-600">Validates your current Slack app manifest against BLT-Lettuce required settings.</p>
      <p class="text-xs text-gray-400 mt-2 font-mono">{{ MANIFEST_PATH }}</p>
    </section>

    <section class="rounded-xl border p-4 {{ STATUS_CLASS }}">
      <div class="flex items-center justify-between gap-4">
        <p class="font-semibold">{{ STATUS_LABEL }}</p>
        <p class="text-sm font-mono">{{ SUMMARY }}</p>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800">Requirement Checks</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="pb-2 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wide">#</th>
              <th class="pb-2 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wide">Requirement</th>
              <th class="pb-2 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wide">Status</th>
              <th class="pb-2 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wide">Details</th>
            </tr>
          </thead>
          <tbody>
            {{ CHECK_ROWS }}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
