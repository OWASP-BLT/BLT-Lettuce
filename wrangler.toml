name = "blt-lettuce"
main = "src/worker.py"
compatibility_date = "2026-03-01"
compatibility_flags = ["python_workers"]


[[d1_databases]]
binding = "DB"
database_name = "blt-lettuce"
database_id = "b68ec3d9-6766-4496-b926-c8a24f29f2dd"

# Environment variables (secrets should be set via wrangler secret put)
# Required secrets:
#   wrangler secret put SLACK_TOKEN        # Slack Bot User OAuth Token (xoxb-...)
#   wrangler secret put SIGNING_SECRET     # Slack App Signing Secret
#   wrangler secret put SLACK_CLIENT_ID    # Slack OAuth App Client ID
#   wrangler secret put SLACK_CLIENT_SECRET # Slack OAuth App Client Secret
#
# Optional secrets (for custom channel IDs):
#   wrangler secret put JOINS_CHANNEL_ID   # Channel ID where join notifications are posted
#   wrangler secret put CONTRIBUTE_ID      # Channel ID for contribution guidelines
#   wrangler secret put DEPLOYS_CHANNEL    # Channel for deployment notifications

[vars]
ENVIRONMENT = "production"
VERSION = "2.0.0"
# Base URL for OAuth redirect URIs – override per environment if needed
BASE_URL = "https://lettuce.owaspblt.org"


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
