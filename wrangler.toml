name = "blt-lettuce"
main = "src/worker.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]

# D1 Database for persistent storage (workspaces, users, sessions, events, channels, repos)
# To create:
#   wrangler d1 create BLT_DB
# Then replace the placeholder database_id below with the actual ID from the output.
# To apply schema:
#   wrangler d1 execute BLT_DB --file=schema.sql            # remote
#   wrangler d1 execute BLT_DB --local --file=schema.sql    # local dev
[[d1_databases]]
binding = "DB"
database_name = "blt-lettuce"
database_id = "b68ec3d9-6766-4496-b926-c8a24f29f2dd"

# Environment variables (secrets should be set via wrangler secret put)
# Required secrets:
#   wrangler secret put SLACK_TOKEN        # Slack Bot User OAuth Token (xoxb-...)
#   wrangler secret put SIGNING_SECRET     # Slack App Signing Secret
#   wrangler secret put SLACK_CLIENT_ID    # Slack OAuth App Client ID
#   wrangler secret put SLACK_CLIENT_SECRET # Slack OAuth App Client Secret
#
# Note: The D1 binding name used in code is "DB" (env.DB). The database is
#       named "BLT_DB" in Cloudflare but accessed via the binding name "DB".
#
# Optional secrets (for custom channel IDs):
#   wrangler secret put JOINS_CHANNEL_ID   # Channel ID where join notifications are posted
#   wrangler secret put CONTRIBUTE_ID      # Channel ID for contribution guidelines
#   wrangler secret put DEPLOYS_CHANNEL    # Channel for deployment notifications

[vars]
ENVIRONMENT = "production"
VERSION = "2.0.0"
# Base URL for OAuth redirect URIs – override per environment if needed
BASE_URL = "https://lettuce.owaspblt.org"


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
